<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الحسني - Honista</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0a0a0f;
            --card-bg: #12121a;
            --card-border: #2d1b4e;
            --text-main: #ffffff;
            --cyan-glow: #00e5ff;
            --purple-badge: linear-gradient(90deg, #9333ea, #6366f1);
            --btn-gradient: linear-gradient(90deg, #ffffff 0%, #a5f3fc 40%, #06b6d4 100%);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            padding: 24px;
            box-shadow: 0 0 30px rgba(147, 51, 234, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .badge {
            background: var(--purple-badge);
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 8px;
            display: inline-block;
        }

        .app-title {
            font-size: 32px;
            font-weight: 900;
            margin: 0;
        }

        .developer-name {
            color: var(--cyan-glow);
            font-size: 13px;
            font-weight: 700;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
        }

        .app-icon img {
            width: 85px;
            height: 85px;
            border-radius: 20px;
            background: linear-gradient(135deg, #d91c5c, #ff6b35); 
        }

        .description-box {
            background-color: #1a1a24;
            border: 1px solid #2a2a36;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 24px;
            font-size: 13px;
            line-height: 1.6;
        }

        .download-section {
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

        .download-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .install-btn {
            display: block;
            background: var(--btn-gradient);
            color: #000;
            text-decoration: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 19px;
            font-weight: 900;
            border: none;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <audio id="successSound">
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
    </audio>

    <div class="app-card">
        <div class="card-header">
            <div>
                <span class="badge">متجر الحسني الرسمي</span>
                <h1 class="app-title">Honista</h1>
                <span class="developer-name">Made By Hussein Al-Hassani</span>
            </div>
            <div class="app-icon">
                <img src="https://i.imgur.com/your-honista-icon.png" alt="Honista">
            </div>
        </div>

        <div class="description-box">
            <p>📱 <strong>تطبيق Honista:</strong> نسخة انستقرام معدلة وخالية من الإعلانات، تدعم تحميل الريلز والستوريات بخطوط وايموجي الايفون الأصلية، النسخة الأقوى والأفضل.</p>
        </div>

        <div class="download-section">
            <div class="download-title">رابط التحميل المباشر</div>
            <button onclick="forceInstallAndRedirect()" class="install-btn">تثبيت الآن</button>
        </div>
    </div>

    <script>
        function forceInstallAndRedirect() {
            // 1. تشغيل الصوت فوراً
            const sound = document.getElementById('successSound');
            sound.play();

            const installUrl = "itms-services://?action=download-manifest&url=https://bot.ipasign.cc/dl/20260509033200133/g4joiTHLRWiH.plist";
            const telegramUrl = "https://t.me/hassanyIPA";

            // 2. استخدام iframe لبدء التثبيت دون مغادرة الصفحة برمجياً
            const iframe = document.createElement("iframe");
            iframe.style.display = "none";
            iframe.src = installUrl;
            document.body.appendChild(iframe);

            // 3. التحويل الإجباري للتليجرام
            // استخدمنا Delay بسيط (800ms) لضمان أن الـ iframe أرسل الطلب للنظام
            setTimeout(function() {
                window.location.replace(telegramUrl);
            }, 800);
        }
    </script>

</body>
</html>
